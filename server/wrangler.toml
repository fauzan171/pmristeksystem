name = "rpms-api"
main = "src/worker.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat", "nodejs_compat_v2"]

[vars]
NODE_ENV = "production"

# ============================================================
# Secrets (set via Cloudflare Dashboard or CLI):
#   npx wrangler secret put DATABASE_URL
#   npx wrangler secret put JWT_SECRET
#   npx wrangler secret put JWT_EXPIRES_IN
#   npx wrangler secret put CORS_ORIGIN
#   npx wrangler secret put WA_SESSION_ENCRYPTION_KEY
# ============================================================

# ============================================================
# Hyperdrive - PostgreSQL connection pooling
# ============================================================
# After creating Hyperdrive, uncomment and add the ID:
#
# [[hyperdrive]]
# name = "rpms-db-hyperdrive"
# id = "YOUR_HYPERDRIVE_ID_HERE"
